<title>Birthday Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --accent: #ff6b9d;
    --accent2: #ffd166;
    --text: #e8eaf0;
    --muted: #8b90a3;
    --today: #2a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    line-height: 1.5;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .date { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin: 24px 0 10px;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid transparent;
  }
  .card.today {
    background: var(--today);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,107,157,0.25);
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1.1rem;
    color: #0f1117;
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .name { font-weight: 600; }
  .meta { font-size: 0.85rem; color: var(--muted); }
  .badge {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    font-weight: 600;
  }
  .badge.today { background: var(--accent); color: #0f1117; }
  .badge.soon { background: rgba(255,209,102,0.18); color: var(--accent2); }
  .badge.passed { background: rgba(139,144,163,0.18); color: var(--muted); }
  .card.passed { opacity: 0.75; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .refresh {
    margin-top: 28px;
    background: var(--card);
    border: 1px solid #2a2e3d;
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
    width: 100%;
  }
</style>
</head>

const MONTHS = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
const COLORS = ["#ff6b9d","#ffd166","#06d6a0","#4cc9f0","#b388ff","#ff9e6d","#80ed99"];

function initials(name){
  const p = name.trim().split(/\s+/);
  return ((p[0]?.[0]||"") + (p[1]?.[0]||"")).toUpperCase();
}
function colorFor(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))>>>0;
  return COLORS[h%COLORS.length];
}
// days from today until next occurrence of this birthday
function daysUntil(day, monthIdx){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let next = new Date(today.getFullYear(), monthIdx, day);
  if(next < today) next = new Date(today.getFullYear()+1, monthIdx, day);
  return Math.round((next - today)/86400000);
}
// days since the most recent past occurrence of this birthday
function daysSince(day, monthIdx){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let prev = new Date(today.getFullYear(), monthIdx, day);
  if(prev > today) prev = new Date(today.getFullYear()-1, monthIdx, day);
  return Math.round((today - prev)/86400000);
}

function render(){
  const now = new Date();
  document.getElementById("todayDate").textContent =
    now.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const enriched = birthdays.map(b=>{
    const mi = MONTHS.indexOf(b.month);
    return {...b, monthIdx: mi, diff: daysUntil(b.day, mi), since: daysSince(b.day, mi)};
  });

  const todays = enriched.filter(b=>b.diff===0);
  const upcoming = enriched.filter(b=>b.diff>0 && b.diff<=30).sort((a,b)=>a.diff-b.diff);
  const passed = enriched.filter(b=>b.since>0 && b.since<=7).sort((a,b)=>a.since-b.since);

  // TODAY
  const tl = document.getElementById("todayList");
  tl.innerHTML = todays.length ? todays.map(b=>cardHTML(b,'today')).join("")
    : '<div class="empty">No birthdays today.</div>';

  // UPCOMING
  const ul = document.getElementById("upcomingList");
  ul.innerHTML = upcoming.length ? upcoming.map(b=>cardHTML(b,'soon')).join("")
    : '<div class="empty">Nothing in the next 30 days.</div>';

  // PASSED
  const pl = document.getElementById("passedList");
  pl.innerHTML = passed.length ? passed.map(b=>cardHTML(b,'passed')).join("")
    : '<div class="empty">None in the last 7 days.</div>';

  notify(todays, upcoming);
}

function cardHTML(b, type){
  let when, cls = type;
  if(type==='today'){ when = "Today 🎉"; }
  else if(type==='passed'){ when = b.since===1 ? "Yesterday" : `${b.since} days ago`; }
  else { when = b.diff===1 ? "Tomorrow" : `in ${b.diff} days`; cls='soon'; }
  const cardCls = type==='today' ? 'today' : type==='passed' ? 'passed' : '';
  return `<div class="card ${cardCls}">
    <div class="avatar" style="background:${colorFor(b.name)}">${initials(b.name)}</div>
    <div class="info">
      <div class="name">${b.name}</div>
      <div class="meta">${b.month} ${b.day}</div>
    </div>
    <div class="badge ${cls}">${when}</div>
  </div>`;
}

function notify(todays, upcoming){
  if(!("Notification" in window)) return;
  const fire = ()=>{
    if(Notification.permission!=="granted") return;
    if(todays.length){
      new Notification("🎂 Birthday today!", {body: todays.map(b=>b.name).join(", ")});
    }
    const tomorrow = upcoming.filter(b=>b.diff===1);
    if(tomorrow.length){
      new Notification("🎈 Birthday tomorrow", {body: tomorrow.map(b=>b.name).join(", ")});
    }
  };
  if(Notification.permission==="granted") fire();
  else if(Notification.permission!=="denied")
    Notification.requestPermission().then(p=>{ if(p==="granted") fire(); });
}

render();
</script>
</body>
</html>
